name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v7
        with:
          # Pinned prebuilt golangci-lint v2. Lint rules live in .golangci.yml,
          # which re-adds v1's default exclusions so this stays behavior-preserving.
          # v2 is built with a current Go toolchain, so the fast prebuilt binary
          # lints this module (whose go directive is 1.25.x) without the goinstall
          # workaround. Bump this pin if the go.mod go directive ever outpaces the
          # Go version the pinned release was built with.
          version: v2.12.2

  build-windows:
    name: build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: Build
        run: go build ./...
