version: 2

project_name: harharbinks

before:
  hooks:
    - go mod tidy

builds:
  - id: hhb
    main: ./cmd/hhb
    binary: hhb
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: hhb
    name_template: "hhb_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: bapatchirag
    name: harharbinks
  draft: false
  prerelease: auto
  name_template: "harharbinks {{ .Tag }}"
